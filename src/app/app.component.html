<!-- Layout with sidebar/header/footer for authenticated pages -->
<div class="app-shell" [class.sidebar-collapsed]="sidebarCollapsed" *ngIf="showLayout">
  <!-- Sidebar cố định bên trái -->
  <app-sidebar 
    [mobileOpen]="mobileSidebarOpen" 
    (collapsedChange)="onSidebarCollapsedChange($event)"
    (mobileClose)="mobileSidebarOpen = false">
  </app-sidebar>

  <!-- Mobile overlay backdrop -->
  <div class="mobile-backdrop" [class.active]="mobileSidebarOpen" (click)="mobileSidebarOpen = false"></div>

  <!-- Main area bên phải -->
  <div class="main">
    <app-header (mobileSidebarToggle)="onMobileSidebarToggle()"></app-header>

    <!-- Content thay đổi theo từng page -->
    <main class="content">
      <router-outlet></router-outlet>
    </main>

    <app-footer></app-footer>
  </div>
</div>

<!-- Simple layout for login/register pages -->
<div class="auth-shell" *ngIf="!showLayout">
  <router-outlet></router-outlet>
</div>

<!-- Toastr component - hiển thị thông báo -->
<app-toastr></app-toastr>

<!-- Chat Bubble - Floating AI Assistant -->
<app-chat-bubble *ngIf="showLayout"></app-chat-bubble>
