<header class="header">
  <div class="header-left">
    <button class="mobile-menu-btn" (click)="toggleMobileSidebar()">
      <i class="fa-solid fa-bars"></i>
    </button>
    <div>
      <h1 class="page-title">{{ pageTitle }}</h1>
      <p class="page-subtitle">{{ pageSubtitle }}</p>
    </div>
  </div>

  <div class="header-right">

    <!-- Notification bell -->
    <button class="btn-icon" title="Thông báo">
      <i class="fa-regular fa-bell" aria-hidden="true"></i>
    </button>

    <!-- User dropdown -->
    <div class="user-dropdown-container">
      <div class="header-user">
        <div class="avatar">{{ avatarInitial }}</div>
        <div class="user-meta">
          <span class="user-name">{{ username }}</span>
          <span class="user-role">{{ roleDisplay }}</span>
        </div>
        <i class="fa-solid fa-chevron-down chevron-icon" aria-hidden="true"></i>
      </div>

      <div class="dropdown-menu">
        <!-- User info card -->
        <div class="dropdown-user-card">
          <div class="dropdown-avatar">{{ avatarInitial }}</div>
          <div class="dropdown-user-text">
            <span class="dropdown-username">{{ username }}</span>
            <span class="dropdown-role">{{ roleDisplay }}</span>
          </div>
        </div>

        <div class="dropdown-divider"></div>

        <a class="dropdown-item" (click)="viewProfile()">
          <i class="fa-regular fa-user" aria-hidden="true"></i>
          <span>Xem thông tin</span>
        </a>

        <a class="dropdown-item" (click)="changePassword()">
          <i class="fa-solid fa-lock" aria-hidden="true"></i>
          <span>Đổi mật khẩu</span>
        </a>

        <a class="dropdown-item" (click)="settings()">
          <i class="fa-solid fa-gear" aria-hidden="true"></i>
          <span>Cài đặt</span>
        </a>

        <div class="dropdown-divider"></div>

        <a class="dropdown-item logout" (click)="logout()">
          <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
          <span>Đăng xuất</span>
        </a>
      </div>
    </div>

  </div>
</header>
