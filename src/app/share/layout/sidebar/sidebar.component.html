<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <img
        src="assets/images/whs-logo-2.png"
        alt="Warehouse System"
      />
    </div>
    <span class="logo-text">Ware House System</span>
  </div>

  <ng-container *ngFor="let section of navSections">
    <div class="nav-section-title">{{ section.title }}</div>
    <nav class="sidebar-nav">
      <a class="nav-item" *ngFor="let item of section.items" [routerLink]="item.route" routerLinkActive="active">
        <span class="nav-icon"><i [class]="item.iconClass" aria-hidden="true"></i></span>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </nav>
  </ng-container>

</aside>
