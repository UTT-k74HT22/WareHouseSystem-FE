<div class="chat-bubble-wrapper">
  <div class="chat-popup" [class.open]="isOpen">
    <div class="chat-popup-header">
      <div class="header-left">
        <div class="bot-avatar">
          <i class="fa-solid fa-robot"></i>
        </div>
        <div class="header-info">
          <h4>{{ panelTitle }}</h4>
          <span class="status">
            <span class="status-dot"></span>
            {{ panelStatus }}
          </span>
        </div>
      </div>
      <div class="header-actions">
        <button class="action-btn" (click)="openFullPage()" title="Mở trang đầy đủ">
          <i class="fa-solid fa-expand"></i>
        </button>
        <button class="action-btn" (click)="clearChat()" title="Xóa cuộc trò chuyện">
          <i class="fa-solid fa-trash"></i>
        </button>
        <button class="action-btn close-btn" (click)="toggle()">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>

    <div class="chat-popup-messages" #messagesContainer>
      <div
        *ngFor="let message of messages"
        class="message"
        [class.user-message]="message.sender === 'user'"
        [class.bot-message]="message.sender === 'bot'"
        [class.loading-message]="message.isLoading"
      >
        <div *ngIf="message.sender === 'bot'" class="avatar bot-avatar-small">
          <i class="fa-solid fa-robot"></i>
        </div>

        <div class="message-content">
          <div *ngIf="!message.isLoading" class="message-text">{{ message.content }}</div>
          <div *ngIf="message.isLoading" class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="message-time">{{ formatTime(message.timestamp) }}</div>
        </div>

        <div *ngIf="message.sender === 'user'" class="avatar user-avatar-small">
          <i class="fa-solid fa-user"></i>
        </div>
      </div>

      <div class="quick-replies" *ngIf="messages.length === 1 && messages[0].sender === 'bot'">
        <span class="quick-reply-label">Câu hỏi gợi ý</span>
        <div class="quick-reply-buttons">
          <button
            *ngFor="let suggestion of suggestions"
            class="quick-reply-btn"
            (click)="sendSuggestion(suggestion)"
          >
            {{ suggestion }}
          </button>
        </div>
      </div>
    </div>

    <div class="chat-popup-input">
      <input
        type="text"
        [(ngModel)]="newMessage"
        (keydown)="onKeyDown($event)"
        [placeholder]="inputPlaceholder"
        [disabled]="isLoading"
      />
      <button
        class="send-btn"
        (click)="sendMessage()"
        [disabled]="!newMessage.trim() || isLoading"
      >
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </div>

  <button class="chat-fab" (click)="toggle()" [class.has-messages]="messages.length > 0">
    <i class="fa-solid" [class.fa-robot]="!isOpen" [class.fa-xmark]="isOpen"></i>
    <span *ngIf="!isOpen" class="notification-dot"></span>
  </button>
</div>
