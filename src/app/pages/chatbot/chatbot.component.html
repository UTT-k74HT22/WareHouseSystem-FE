<div class="chat-container">
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="bot-avatar">
        <i class="fa-solid fa-robot"></i>
      </div>
      <div class="chat-header-info">
        <h3>{{ panelTitle }}</h3>
        <span class="status">
          <span class="status-dot"></span>
          {{ panelStatus }}
        </span>
      </div>
    </div>
    <button class="clear-btn" (click)="clearChat()" title="Xóa cuộc trò chuyện">
      <i class="fa-solid fa-trash-can"></i>
    </button>
  </div>

  <div class="chat-messages" #messagesContainer>
    <div
      *ngFor="let message of messages"
      class="message"
      [class.user-message]="message.sender === 'user'"
      [class.bot-message]="message.sender === 'bot'"
      [class.loading-message]="message.isLoading"
    >
      <div *ngIf="message.sender === 'bot'" class="avatar bot-avatar-small">
        <i class="fa-solid fa-robot"></i>
      </div>

      <div class="message-content">
        <div *ngIf="!message.isLoading" class="message-text">{{ message.content }}</div>
        <div *ngIf="message.isLoading" class="loading-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="message-time">{{ formatTime(message.timestamp) }}</div>
      </div>

      <div *ngIf="message.sender === 'user'" class="avatar user-avatar-small">
        <i class="fa-solid fa-user"></i>
      </div>
    </div>

    <div class="quick-replies" *ngIf="showSuggestions">
      <span class="quick-reply-label">{{ isWelcomeState ? 'Gợi ý' : 'Tiếp theo' }}</span>
      <div class="quick-reply-buttons">
        <button
          *ngFor="let suggestion of currentSuggestions"
          class="quick-reply-btn"
          (click)="sendSuggestion(suggestion)"
          [title]="suggestion.query || suggestion.label"
        >
          {{ suggestion.label }}
        </button>
      </div>
    </div>
  </div>

  <div class="chat-input">
    <input
      type="text"
      [(ngModel)]="newMessage"
      (keydown)="onKeyDown($event)"
      [placeholder]="inputPlaceholder"
      [disabled]="isLoading"
    />
    <button
      class="send-btn"
      (click)="sendMessage()"
      [disabled]="!newMessage.trim() || isLoading"
    >
      <i class="fa-solid fa-paper-plane"></i>
    </button>
  </div>
</div>
