name: CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"
      - "angular.json"
      - "tsconfig*.json"
      - "Dockerfile"
      - "deploy/**"
      - "src/**"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "package.json"
      - "package-lock.json"
      - "angular.json"
      - "tsconfig*.json"
      - "Dockerfile"
      - "deploy/**"
      - "src/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-and-image:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1

      - name: Export Chrome path
        run: echo "CHROME_BIN=${{ steps.chrome.outputs.chrome-path }}" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Build production bundle
        run: npm run build -- --configuration production

      - name: Derive image coordinates
        id: image
        run: |
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo_lc="$(echo "${GITHUB_EVENT_REPOSITORY_NAME:-${GITHUB_REPOSITORY#*/}}" | tr '[:upper:]' '[:lower:]')"
          echo "registry_image=ghcr.io/${owner_lc}/${repo_lc}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.registry_image }}
          tags: |
            type=raw,value=sha-${{ github.sha }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summarize image publication
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          {
            echo "## Published image"
            echo
            echo "- \`${{ steps.image.outputs.registry_image }}:sha-${{ github.sha }}\`"
            echo "- \`${{ steps.image.outputs.registry_image }}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
